<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Reader</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23f5f5f7'/><rect x='22' y='16' width='40' height='52' rx='4' fill='none' stroke='%23007aff' stroke-width='5'/><rect x='38' y='32' width='40' height='52' rx='4' fill='%23fff' stroke='%23007aff' stroke-width='5'/><line x1='46' y1='44' x2='70' y2='44' stroke='%23007aff' stroke-width='3.5' stroke-linecap='round'/><line x1='46' y1='54' x2='64' y2='54' stroke='%23007aff' stroke-width='3.5' stroke-linecap='round'/><line x1='46' y1='64' x2='58' y2='64' stroke='%23007aff' stroke-width='3.5' stroke-linecap='round'/></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f7;--card:#fff;--text:#1d1d1f;--text2:#86868b;--text3:#aeaeb2;
  --blue:#007aff;--purple:#af52de;--green:#34c759;--red:#ff3b30;--orange:#ff9500;
  --border:rgba(0,0,0,.08);--shadow:0 1px 3px rgba(0,0,0,.06),0 2px 8px rgba(0,0,0,.04);
  --shadow-lg:0 4px 20px rgba(0,0,0,.08);--radius:14px;--radius-sm:10px;
  --sidebar-w:260px;--topbar-h:56px;
  --glass:rgba(255,255,255,.72);--glass-border:rgba(255,255,255,.5);
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;font-size:14px}
input,select,textarea{font-family:inherit;font-size:14px}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.25)}

.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar-w);background:var(--glass);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:margin-left .3s ease;margin-left:0}
.sidebar.collapsed{margin-left:calc(var(--sidebar-w) * -1)}
.sidebar-toggle{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .15s;flex-shrink:0}
.sidebar-toggle:hover{background:rgba(0,0,0,.04);color:var(--text)}
.sidebar-toggle svg{width:18px;height:18px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

.sidebar-header{padding:20px 20px 12px;display:flex;align-items:center;gap:10px}
.sidebar-title{font-size:17px;font-weight:600;letter-spacing:-.2px}
.sidebar-section{padding:8px 12px}
.sidebar-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;padding:8px 8px 4px;display:flex;align-items:center;justify-content:space-between}
.sidebar-label button{color:var(--blue);font-size:11px;font-weight:600;padding:2px 6px;border-radius:4px}
.sidebar-label button:hover{background:rgba(0,122,255,.1)}
.cat-list{list-style:none}
.cat-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:all .15s ease;position:relative;font-size:14px;color:var(--text)}
.cat-item:hover{background:rgba(0,0,0,.04)}
.cat-item.active{background:rgba(0,122,255,.1);color:var(--blue);font-weight:500}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cat-count{margin-left:auto;font-size:12px;color:var(--text3);font-weight:500}
.cat-delete{opacity:0;position:absolute;right:8px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;color:var(--text3);transition:all .15s}
.cat-item:hover .cat-delete{opacity:1}
.cat-item:hover .cat-count{opacity:0}
.cat-delete:hover{color:var(--red);background:rgba(255,59,48,.1)}
.cat-delete svg{width:12px;height:12px}
.sidebar-footer{margin-top:auto;padding:16px 20px}

.topbar{height:var(--topbar-h);padding:0 24px;display:flex;align-items:center;gap:16px;flex-shrink:0;border-bottom:1px solid var(--border);background:var(--glass);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px)}
.search-box{flex:1;max-width:400px;position:relative}
.search-box input{width:100%;height:36px;padding:0 12px 0 36px;border:1px solid var(--border);border-radius:var(--radius-sm);background:rgba(0,0,0,.03);outline:none;transition:all .2s}
.search-box input:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(0,122,255,.12)}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text3);pointer-events:none}
.topbar-actions{display:flex;gap:8px;margin-left:auto}
.btn{height:36px;padding:0 16px;border-radius:var(--radius-sm);font-weight:500;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:#0066d6}
.btn-ghost{color:var(--text)}
.btn-ghost:hover{background:rgba(0,0,0,.04)}
.btn svg{width:16px;height:16px}
.view-toggle{display:flex;background:rgba(0,0,0,.04);border-radius:8px;padding:2px}
.view-toggle button{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .15s}
.view-toggle button.active{background:#fff;color:var(--text);box-shadow:var(--shadow)}
.view-toggle svg{width:16px;height:16px}

.content{flex:1;overflow-y:auto;padding:24px}
.content-header{margin-bottom:20px}
.content-title{font-size:22px;font-weight:600;letter-spacing:-.3px}
.content-sub{font-size:13px;color:var(--text2);margin-top:2px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.book-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;transition:all .2s ease;position:relative;cursor:pointer}
.book-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:rgba(0,0,0,.1)}
.book-card.pinned{border-color:var(--blue);box-shadow:0 0 0 1px var(--blue)}
.book-preview{height:140px;background:#fafafa;overflow:hidden;position:relative;border-bottom:1px solid var(--border)}
.book-pin-badge{position:absolute;top:8px;left:8px;width:24px;height:24px;background:var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center}
.book-pin-badge svg{width:12px;height:12px;fill:#fff}
.book-info{padding:14px}
.book-title{font-size:14px;font-weight:600;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;letter-spacing:-.1px}
.book-meta{display:flex;align-items:center;gap:8px;margin-top:8px}
.book-category{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.book-date{font-size:11px;color:var(--text3);margin-left:auto}
.book-actions{position:absolute;top:8px;right:8px;display:flex;gap:4px;opacity:0;transition:opacity .15s}
.book-card:hover .book-actions{opacity:1}
.book-action-btn{width:28px;height:28px;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);border-radius:6px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);transition:all .15s}
.book-action-btn:hover{background:#fff;box-shadow:var(--shadow)}
.book-action-btn svg{width:14px;height:14px;color:var(--text2)}
.book-action-btn.pin-active{color:var(--blue)}
.book-action-btn.pin-active svg{fill:var(--blue)}

.list{display:flex;flex-direction:column;gap:10px}
.list .book-card{display:flex;border-radius:var(--radius-sm)}
.list .book-preview{width:48px;height:48px;flex-shrink:0;border-radius:var(--radius-sm) 0 0 var(--radius-sm);border-bottom:none;border-right:1px solid var(--border)}
.list .book-preview svg{width:24px;height:24px}
.list .book-info{flex:1;padding:10px 14px;display:flex;align-items:center;gap:10px;min-width:0}
.list .book-title{-webkit-line-clamp:1;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list .book-meta{margin-top:0;flex-shrink:0;gap:6px}
.list .book-actions{position:static;opacity:0}
.list .book-card:hover .book-actions{opacity:1}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--text2)}
.empty-icon{width:64px;height:64px;background:rgba(0,0,0,.04);border-radius:16px;display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.empty-icon svg{width:28px;height:28px;color:var(--text3)}
.empty-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:4px}
.empty-desc{font-size:13px;text-align:center;max-width:300px;line-height:1.5}

.modal-overlay{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.35);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.active{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.15);width:440px;max-width:90vw;max-height:80vh;overflow:auto;transform:scale(.95);transition:transform .2s}
.modal-overlay.active .modal{transform:scale(1)}
.modal-header{padding:20px 24px 16px;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:17px;font-weight:600}
.modal-close{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .15s}
.modal-close:hover{background:rgba(0,0,0,.06);color:var(--text)}
.modal-close svg{width:16px;height:16px}
.modal-body{padding:0 24px 24px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:6px}
.form-input{width:100%;height:40px;padding:0 12px;border:1px solid var(--border);border-radius:var(--radius-sm);outline:none;transition:all .2s}
.form-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,122,255,.12)}
.form-select{width:100%;height:40px;padding:0 12px;border:1px solid var(--border);border-radius:var(--radius-sm);outline:none;background:#fff;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%2386868b' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 12px center;transition:all .2s}
.form-select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,122,255,.12)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;padding-top:8px}
.btn-cancel{height:36px;padding:0 16px;border-radius:var(--radius-sm);font-weight:500;color:var(--text)}
.btn-cancel:hover{background:rgba(0,0,0,.04)}

.drop-zone{position:fixed;inset:0;z-index:1500;background:rgba(0,122,255,.08);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.drop-zone.active{opacity:1;pointer-events:all}
.drop-zone-inner{border:3px dashed var(--blue);border-radius:24px;padding:60px 80px;text-align:center;background:rgba(255,255,255,.9)}
.drop-zone-icon{width:56px;height:56px;background:rgba(0,122,255,.1);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.drop-zone-icon svg{width:28px;height:28px;color:var(--blue)}
.drop-zone-title{font-size:18px;font-weight:600;margin-bottom:4px}
.drop-zone-desc{font-size:13px;color:var(--text2)}

.toast-container{position:fixed;top:20px;right:20px;z-index:3000;display:flex;flex-direction:column;gap:8px}
.toast{background:#1d1d1f;color:#fff;padding:12px 20px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.15);transform:translateX(120%);transition:transform .3s ease;max-width:320px}
.toast.show{transform:translateX(0)}
.toast.error{background:var(--red)}

.import-progress{margin-top:12px}
.import-bar{height:4px;background:rgba(0,0,0,.06);border-radius:2px;overflow:hidden}
.import-bar-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .3s;width:0}
.import-status{font-size:12px;color:var(--text2);margin-top:6px}

.context-menu{position:fixed;z-index:2500;background:#fff;border-radius:var(--radius-sm);box-shadow:0 8px 30px rgba(0,0,0,.12);border:1px solid var(--border);padding:4px;min-width:180px;opacity:0;pointer-events:none;transform:scale(.95);transition:all .15s}
.context-menu.active{opacity:1;pointer-events:all;transform:scale(1)}
.ctx-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;font-size:13px;cursor:pointer;transition:background .1s}
.ctx-item:hover{background:rgba(0,0,0,.04)}
.ctx-item svg{width:16px;height:16px;color:var(--text2)}
.ctx-item.danger{color:var(--red)}
.ctx-item.danger svg{color:var(--red)}
.ctx-sep{height:1px;background:var(--border);margin:4px 0}

.cat-select-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;font-size:14px}
.cat-select-item:hover{background:rgba(0,0,0,.04)}
.cat-select-item.active{background:rgba(0,122,255,.08)}
.cat-select-item svg{margin-left:auto}

@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:100;margin-left:0;transform:translateX(-100%)}
  .sidebar.collapsed{transform:translateX(-100%);margin-left:0}
  .sidebar:not(.collapsed){transform:translateX(0)}
  .grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
  .list .book-preview{display:none}
  .list .book-info{padding:12px 14px}
  .list .book-title{-webkit-line-clamp:2;white-space:normal}
  .topbar{padding:0 12px;gap:10px}
  .search-box input{height:34px;font-size:13px}
  .content{padding:16px}
  .list{gap:8px}
}
</style>
</head>
<body>
<div class="app" id="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="sidebar-toggle" onclick="toggleSidebar()" title="收起侧边栏">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="11 17 6 12 11 7"/></svg>
      </button>
      <span class="sidebar-title">HTML Reader</span>
    </div>
    <div class="sidebar-section" style="flex:1;overflow-y:auto">
      <div class="sidebar-label">
        <span>分类</span>
        <button onclick="showAddCategory()" title="新建分类">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
      <ul class="cat-list" id="catList"></ul>
    </div>
    <div class="sidebar-footer">
      <button onclick="showSettings()" style="color:var(--text2);font-size:12px;display:flex;align-items:center;gap:4px" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--text2)'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        设置
      </button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="sidebar-toggle" onclick="toggleSidebar()" title="切换侧边栏">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="搜索文档..." oninput="onSearch()">
      </div>
      <div class="topbar-actions">
        <div class="view-toggle">
          <button id="gridViewBtn" class="active" onclick="setView('grid')" title="网格">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          </button>
          <button id="listViewBtn" onclick="setView('list')" title="列表">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          </button>
        </div>
        <button class="btn btn-primary" onclick="showImport()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          导入
        </button>
      </div>
    </div>
    <div class="content" id="content">
      <div class="content-header" id="contentHeader"></div>
      <div id="bookGrid" class="grid"></div>
    </div>
  </div>
</div>

<!-- Import Modal -->
<div class="modal-overlay" id="importModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">导入 HTML</span>
      <button class="modal-close" onclick="hideImport()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">选择文件</label>
        <div id="fileDropArea" style="border:2px dashed var(--border);border-radius:var(--radius-sm);padding:30px;text-align:center;cursor:pointer;transition:all .2s" onclick="document.getElementById('fileInput').click()">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="1.5" stroke-linecap="round" style="margin-bottom:8px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <div style="font-size:13px;color:var(--text2)" id="fileLabel">点击选择或拖放 HTML 文件</div>
          <input type="file" id="fileInput" accept=".html,.htm" multiple style="display:none" onchange="onFileSelect(this.files)">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">标题</label>
        <input type="text" class="form-input" id="importTitle" placeholder="自动从文件名提取">
      </div>
      <div class="form-group">
        <label class="form-label">分类</label>
        <select class="form-select" id="importCategory"></select>
      </div>
      <div class="import-progress" id="importProgress" style="display:none">
        <div class="import-bar"><div class="import-bar-fill" id="importBarFill"></div></div>
        <div class="import-status" id="importStatus">准备中...</div>

</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal" style="width:420px">
    <div class="modal-header">
      <span class="modal-title">设置</span>
      <button class="modal-close" onclick="hideSettings()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div style="background:rgba(0,122,255,.06);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:20px;font-size:13px;color:var(--text2);line-height:1.5">
        <div style="font-weight:600;color:var(--text);margin-bottom:4px">连接 GitHub 仓库</div>
        需要一个 GitHub Personal Access Token 来读写仓库。
        <br>Token 仅存储在浏览器本地，不会上传到任何地方。
      </div>
      <div class="form-group">
        <label class="form-label">GitHub Token</label>
        <input type="password" class="form-input" id="settingsToken" placeholder="ghp_xxxxxxxxxxxx" style="font-family:monospace">
      </div>
      <div id="settingsStatus" style="font-size:12px;margin-top:-8px;margin-bottom:12px;min-height:18px"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="testToken()" style="margin-right:auto">测试连接</button>
        <button class="btn-cancel" onclick="hideSettings()">取消</button>

<!-- Drop Zone -->
<div class="drop-zone" id="dropZone">
  <div class="drop-zone-inner">

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </div>
    <div class="drop-zone-title">释放以导入文件</div>
    <div class="drop-zone-desc">支持 .html 和 .htm 文件</div>
  </div>
</div>

<!-- Context Menu -->
<div class="context-menu" id="ctxMenu"></div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script>
const GH_USER='AHH20250507',GH_REPO='html-reader';
const GH_API=`https://api.github.com/repos/${GH_USER}/${GH_REPO}`;
const META_PATH='reader-metadata.json',BOOKS_DIR='books';

function setGH(t){localStorage.setItem('hr_gh_token',t)}
function getGHToken(){return localStorage.getItem('hr_gh_token')||''}

let state={categories:[{id:'uncategorized',name:'未分类',color:'#86868b'}],books:[],currentCat:'all',viewMode:'grid',searchQuery:''};
let pendingFiles=[],selectedColor='#007aff';

function cleanToken(t){return(t||'').replace(/\u2026/g,'...').replace(/[^\x20-\x7E]/g,'').trim()}
function b64Encode(str){const b=new TextEncoder().encode(str);let s='';b.forEach(c=>s+=String.fromCharCode(c));return btoa(s)}
function b64Decode(b64){const bin=atob(b64.replace(/\n/g,''));return new TextDecoder().decode(Uint8Array.from(bin,c=>c.charCodeAt(0)))}

async function ghFetch(path,opts={}){
  const token=cleanToken(getGHToken());
  if(!token){showSettings();throw new Error('No token')}
  const url=path.startsWith('http')?path:`${GH_API}/contents/${path}`;
  const res=await fetch(url,{...opts,headers:{'Authorization':`token ${token}`,'Accept':'application/vnd.github.v3+json',...(opts.headers||{})}});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.message||`GitHub API error: ${res.status}`)}
  return res.json();
}
async function getFile(path){try{const d=await ghFetch(path);return{content:b64Decode(d.content),sha:d.sha}}catch(e){if(e.message.includes('404')||e.message.includes('Not Found'))return null;throw e}}
async function putFile(path,content,sha=null,message='Update'){
  const token=cleanToken(getGHToken());
  if(!token){showSettings();throw new Error('No token')}
  const body={message,content:b64Encode(content),branch:'main'};
  if(sha)body.sha=sha;
  const res=await fetch(`${GH_API}/contents/${path}`,{method:'PUT',headers:{'Authorization':`token ${token}`,'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.message||`Put file failed: ${res.status}`)}
  return res.json();
}
async function deleteFile(path,sha,message='Delete'){
  const token=cleanToken(getGHToken());
  if(!token){showSettings();throw new Error('No token')}
  const res=await fetch(`${GH_API}/contents/${path}`,{method:'DELETE',headers:{'Authorization':`token ${token}`,'Content-Type':'application/json'},body:JSON.stringify({message,sha,branch:'main'})});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.message||`Delete failed: ${res.status}`)}
  return res.json();
}

let metaSha=null;
async function loadMetadata(){try{const f=await getFile(META_PATH);if(f){const d=JSON.parse(f.content);metaSha=f.sha;state.categories=d.categories||state.categories;state.books=d.books||[]}}catch(e){console.error('Load metadata failed:',e)}}
async function saveMetadata(){const d={version:1,updatedAt:Date.now(),categories:state.categories,books:state.books};const r=await putFile(META_PATH,JSON.stringify(d,null,2),metaSha,'Update metadata');metaSha=r.content.sha}

function renderCategories(){
  const list=document.getElementById('catList');
  let html=`<li class="cat-item ${state.currentCat==='all'?'active':''}" onclick="selectCategory('all')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>全部</span><span class="cat-count">${state.books.length}</span></li><li class="cat-item ${state.currentCat==='pinned'?'active':''}" onclick="selectCategory('pinned')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 17v5"/><path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16h14v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z"/></svg><span>已置顶</span><span class="cat-count">${state.books.filter(b=>b.pinned).length}</span></li>`;
  state.categories.forEach(cat=>{
    const count=state.books.filter(b=>b.category===cat.id).length;
    html+=`<li class="cat-item ${state.currentCat===cat.id?'active':''}" onclick="selectCategory('${cat.id}')"><span class="cat-dot" style="background:${cat.color}"></span><span>${escHtml(cat.name)}</span><span class="cat-count">${count}</span>${cat.id!=='uncategorized'?`<button class="cat-delete" onclick="event.stopPropagation();deleteCategory('${cat.id}')" title="删除分类"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`:''}</li>`;
  });
  list.innerHTML=html;
}

function getFilteredBooks(){
  let books=[...state.books];
  if(state.currentCat==='pinned')books=books.filter(b=>b.pinned);
  else if(state.currentCat!=='all')books=books.filter(b=>b.category===state.currentCat);
  if(state.searchQuery){const q=state.searchQuery.toLowerCase();books=books.filter(b=>b.title.toLowerCase().includes(q))}
  books.sort((a,b)=>{if(a.pinned&&!b.pinned)return-1;if(!a.pinned&&b.pinned)return 1;return(b.lastRead||0)-(a.lastRead||0)});
  return books;
}

function renderBooks(){
  const grid=document.getElementById('bookGrid'),books=getFilteredBooks(),header=document.getElementById('contentHeader');
  let title='全部文档';
  if(state.currentCat==='pinned')title='已置顶';
  else if(state.currentCat!=='all'){const c=state.categories.find(c=>c.id===state.currentCat);title=c?c.name:'文档'}
  if(state.searchQuery)title=`搜索"${state.searchQuery}"`;
  header.innerHTML=`<div class="content-title">${title}</div><div class="content-sub">${books.length} 个文档</div>`;
  if(!books.length){grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><div class="empty-title">${state.searchQuery?'没有找到匹配的文档':'还没有文档'}</div><div class="empty-desc">${state.searchQuery?'试试其他关键词':'点击右上角的「导入」按钮添加 HTML 文件'}</div></div>`;return}
  grid.className=state.viewMode==='list'?'list':'grid';
  grid.innerHTML=books.map(book=>{
    const cat=state.categories.find(c=>c.id===book.category);
    const cc=cat?cat.color:'#86868b',cn=cat?cat.name:'未分类';
    return`<div class="book-card ${book.pinned?'pinned':''}" onclick="openBook('${book.id}')" oncontextmenu="showCtx(event,'${book.id}')"><div class="book-preview"><div style="display:flex;align-items:center;justify-content:center;height:100%;background:linear-gradient(135deg,${cc}08,${cc}15)"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="${cc}" stroke-width="1.2" stroke-linecap="round" opacity=".5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></div>${book.pinned?'<div class="book-pin-badge"><svg viewBox="0 0 24 24"><path d="M12 17v5M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16h14v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z"/></svg></div>':''}</div><div class="book-info"><div class="book-title">${escHtml(book.title)}</div><div class="book-meta"><span class="book-category" style="background:${cc}15;color:${cc}">${escHtml(cn)}</span><span class="book-date">${formatDate(book.importDate)}</span></div></div><div class="book-actions"><button class="book-action-btn ${book.pinned?'pin-active':''}" onclick="event.stopPropagation();togglePin('${book.id}')" title="${book.pinned?'取消置顶':'置顶'}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 17v5M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16h14v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z"/></svg></button><button class="book-action-btn" onclick="event.stopPropagation();downloadBook('${book.id}')" title="下载"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button><button class="book-action-btn" onclick="event.stopPropagation();deleteBook('${book.id}')" title="删除"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button></div></div>`;
  }).join('');
}

function selectCategory(id){state.currentCat=id;renderCategories();renderBooks()}

function showAddCategory(){document.getElementById('catModal').classList.add('active');document.getElementById('catName').value='';renderColorPicker()}
function hideCatModal(){document.getElementById('catModal').classList.remove('active')}
const CAT_COLORS=['#007aff','#5856d6','#af52de','#ff2d55','#ff3b30','#ff9500','#ffcc00','#34c759','#00c7be','#30b0c7','#8e8e93'];
function renderColorPicker(){document.getElementById('colorPicker').innerHTML=CAT_COLORS.map(c=>`<button style="width:28px;height:28px;border-radius:50%;background:${c};border:2px solid ${c===selectedColor?'var(--text)':'transparent'};transition:all .15s" onclick="pickColor('${c}')"></button>`).join('')}
function pickColor(c){selectedColor=c;renderColorPicker()}
function addCategory(){const name=document.getElementById('catName').value.trim();if(!name)return toast('请输入分类名称','error');state.categories.push({id:'cat_'+Date.now(),name,color:selectedColor});saveMetadata();renderCategories();hideCatModal();toast('分类已创建')}

async function deleteCategory(id){
  const booksInCat=state.books.filter(b=>b.category===id);
  if(booksInCat.length){const ok=await showConfirm('删除分类',`该分类下有 ${booksInCat.length} 个文档，删除后将移至「未分类」。确定删除？`);if(!ok)return;booksInCat.forEach(b=>b.category='uncategorized')}
  state.categories=state.categories.filter(c=>c.id!==id);if(state.currentCat===id)state.currentCat='all';saveMetadata();renderCategories();renderBooks();toast('分类已删除');
}

function showImport(){document.getElementById('importModal').classList.add('active');document.getElementById('fileInput').value='';document.getElementById('fileLabel').textContent='点击选择或拖放 HTML 文件';document.getElementById('importTitle').value='';document.getElementById('importProgress').style.display='none';pendingFiles=[];renderImportCategorySelect()}
function hideImport(){document.getElementById('importModal').classList.remove('active')}
function renderImportCategorySelect(){document.getElementById('importCategory').innerHTML=state.categories.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}
function onFileSelect(files){pendingFiles=Array.from(files).filter(f=>f.name.endsWith('.html')||f.name.endsWith('.htm'));if(!pendingFiles.length)return toast('请选择 HTML 文件','error');document.getElementById('fileLabel').textContent=pendingFiles.map(f=>f.name).join(', ');if(pendingFiles.length===1)document.getElementById('importTitle').value=pendingFiles[0].name.replace(/\.html?$/i,'')}

async function doImport(){
  if(!pendingFiles.length)return toast('请先选择文件','error');
  const category=document.getElementById('importCategory').value,customTitle=document.getElementById('importTitle').value.trim(),barFill=document.getElementById('importBarFill'),statusEl=document.getElementById('importStatus');
  document.getElementById('importProgress').style.display='block';document.getElementById('importBtn').disabled=true;
  let ok=0,lastErr='';
  for(let i=0;i<pendingFiles.length;i++){
    const f=pendingFiles[i];barFill.style.width=Math.round(i/pendingFiles.length*100)+'%';statusEl.textContent=`正在导入 ${f.name} (${i+1}/${pendingFiles.length})...`;
    try{const content=await readFile(f);const id='book_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);const title=pendingFiles.length===1&&customTitle?customTitle:f.name.replace(/\.html?$/i,'');await putFile(`${BOOKS_DIR}/${id}.html`,content,null,`Import ${title}`);state.books.push({id,title,filename:`${id}.html`,category,pinned:false,importDate:Date.now(),lastRead:0});ok++}catch(e){lastErr=e.message||String(e)}
  }
  barFill.style.width='100%';
  if(ok>0){await saveMetadata().catch(()=>{});renderCategories();renderBooks()}
  document.getElementById('importBtn').disabled=false;
  if(ok===pendingFiles.length){statusEl.textContent='导入完成！';setTimeout(()=>{hideImport();toast(`成功导入 ${ok} 个文件`)},500)}
  else if(ok>0){statusEl.textContent=`部分完成：${ok}/${pendingFiles.length}`;toast(`导入 ${ok}/${pendingFiles.length}，错误: ${lastErr}`,'error')}
  else{statusEl.textContent='导入失败';toast(`导入失败: ${lastErr}`,'error')}
}
function readFile(f){return new Promise((r,j)=>{const rd=new FileReader();rd.onload=()=>r(rd.result);rd.onerror=j;rd.readAsText(f)})}

const contentCache=new Map();
async function getBookContent(bookId){
  if(contentCache.has(bookId))return contentCache.get(bookId);
  const book=state.books.find(b=>b.id===bookId);if(!book)throw new Error('Book not found');
  const f=await getFile(`${BOOKS_DIR}/${book.filename}`);if(!f)throw new Error('File not found');
  contentCache.set(bookId,f.content);return f.content;
}

// Click → open in new tab
async function openBook(bookId){
  const book=state.books.find(b=>b.id===bookId);if(!book)return;
  book.lastRead=Date.now();saveMetadata();
  try{
    const content=await getBookContent(bookId);
    // Inject scroll-tracking script
    const scrollKey='hr_scroll_'+bookId;
    const script=`\n<script>(function(){var k='${scrollKey}';try{var s=JSON.parse(localStorage.getItem(k)||'{}');if(s.y)window.scrollTo(0,s.y)}catch(e){}var t;window.addEventListener('scroll',function(){clearTimeout(t);t=setTimeout(function(){try{localStorage.setItem(k,JSON.stringify({y:window.scrollY||document.documentElement.scrollTop,t:Date.now()}))}catch(e){}},300)},{passive:true})})()<\/script>`;
    let html=content;
    if(html.includes('</body>'))html=html.replace('</body>',script+'</body>');
    else if(html.includes('</html>'))html=html.replace('</html>',script+'</html>');
    else html+=script;
    const blob=new Blob([html],{type:'text/html;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    window.open(url,'_blank');
    setTimeout(()=>URL.revokeObjectURL(url),60000);
  }catch(e){toast('打开失败: '+e.message,'error')}
}

function togglePin(bookId){const book=state.books.find(b=>b.id===bookId);if(!book)return;book.pinned=!book.pinned;saveMetadata();renderBooks();renderCategories();toast(book.pinned?'已置顶':'已取消置顶')}

async function downloadBook(bookId){
  const book=state.books.find(b=>b.id===bookId);if(!book)return;
  try{const content=await getBookContent(bookId);const blob=new Blob([content],{type:'text/html'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=book.title+'.html';a.click();setTimeout(()=>URL.revokeObjectURL(url),1000)}catch(e){toast('下载失败: '+e.message,'error')}
}

async function deleteBook(bookId){
  const book=state.books.find(b=>b.id===bookId);if(!book)return;
  const ok=await showConfirm('删除文档',`确定删除「${book.title}」？此操作不可撤销。`);if(!ok)return;
  try{const f=await getFile(`${BOOKS_DIR}/${book.filename}`);if(f)await deleteFile(`${BOOKS_DIR}/${book.filename}`,f.sha,`Delete ${book.title}`);state.books=state.books.filter(b=>b.id!==bookId);await saveMetadata();renderCategories();renderBooks();toast('已删除')}catch(e){toast('删除失败: '+e.message,'error')}
}

function showCtx(e,bookId){
  e.preventDefault();e.stopPropagation();
  const book=state.books.find(b=>b.id===bookId);if(!book)return;
  const menu=document.getElementById('ctxMenu');
  menu.innerHTML=`<div class="ctx-item" onclick="openBook('${bookId}');hideCtx()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>新标签页打开</div><div class="ctx-item" onclick="togglePin('${bookId}');hideCtx()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 17v5M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16h14v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z"/></svg>${book.pinned?'取消置顶':'置顶'}</div><div class="ctx-item" onclick="showChangeCat('${bookId}');hideCtx()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>更改分类</div><div class="ctx-item" onclick="downloadBook('${bookId}');hideCtx()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>下载</div><div class="ctx-sep"></div><div class="ctx-item danger" onclick="deleteBook('${bookId}');hideCtx()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>删除</div>`;
  menu.style.left=Math.min(e.clientX,window.innerWidth-200)+'px';menu.style.top=Math.min(e.clientY,window.innerHeight-250)+'px';menu.classList.add('active');
}
function hideCtx(){document.getElementById('ctxMenu').classList.remove('active')}

let changeCatBookId=null;
function showChangeCat(bookId){
  changeCatBookId=bookId;const book=state.books.find(b=>b.id===bookId);if(!book)return;
  document.getElementById('changeCatList').innerHTML=state.categories.map(cat=>`<div class="cat-select-item ${cat.id===book.category?'active':''}" onclick="doChangeCat('${cat.id}')"><span class="cat-dot" style="background:${cat.color}"></span><span>${escHtml(cat.name)}</span>${cat.id===book.category?'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>':''}</div>`).join('');
  document.getElementById('changeCatModal').classList.add('active');
}
function hideChangeCat(){document.getElementById('changeCatModal').classList.remove('active');changeCatBookId=null}
async function doChangeCat(catId){if(!changeCatBookId)return;const book=state.books.find(b=>b.id===changeCatBookId);if(!book)return;book.category=catId;await saveMetadata().catch(()=>{});renderBooks();renderCategories();hideChangeCat();toast('分类已更新')}

document.addEventListener('click',hideCtx);

function setView(mode){state.viewMode=mode;document.getElementById('gridViewBtn').classList.toggle('active',mode==='grid');document.getElementById('listViewBtn').classList.toggle('active',mode==='list');renderBooks()}
function onSearch(){state.searchQuery=document.getElementById('searchInput').value.trim();renderBooks()}

let dragCounter=0;
document.addEventListener('dragenter',e=>{e.preventDefault();dragCounter++;document.getElementById('dropZone').classList.add('active')});
document.addEventListener('dragleave',e=>{e.preventDefault();dragCounter--;if(dragCounter<=0){dragCounter=0;document.getElementById('dropZone').classList.remove('active')}});
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{e.preventDefault();dragCounter=0;document.getElementById('dropZone').classList.remove('active');const files=Array.from(e.dataTransfer.files).filter(f=>f.name.endsWith('.html')||f.name.endsWith('.htm'));if(files.length){pendingFiles=files;showImport();document.getElementById('fileLabel').textContent=files.map(f=>f.name).join(', ');if(files.length===1)document.getElementById('importTitle').value=files[0].name.replace(/\.html?$/i,'')}});
const fileDropArea=document.getElementById('fileDropArea');
fileDropArea.addEventListener('dragover',e=>{e.preventDefault();fileDropArea.style.borderColor='var(--blue)';fileDropArea.style.background='rgba(0,122,255,.04)'});
fileDropArea.addEventListener('dragleave',()=>{fileDropArea.style.borderColor='var(--border)';fileDropArea.style.background=''});
fileDropArea.addEventListener('drop',e=>{e.preventDefault();fileDropArea.style.borderColor='var(--border)';fileDropArea.style.background='';onFileSelect(e.dataTransfer.files)});

let confirmResolve=null;
function showConfirm(title,msg){return new Promise(r=>{confirmResolve=r;document.getElementById('confirmTitle').textContent=title;document.getElementById('confirmMsg').textContent=msg;document.getElementById('confirmModal').classList.add('active')})}
function hideConfirm(result){document.getElementById('confirmModal').classList.remove('active');if(confirmResolve){confirmResolve(result);confirmResolve=null}}

function toggleSidebar(){const sb=document.getElementById('sidebar');sb.classList.toggle('collapsed');localStorage.setItem('hr_sidebar',sb.classList.contains('collapsed')?'collapsed':'open')}
function restoreSidebar(){if(localStorage.getItem('hr_sidebar')==='collapsed')document.getElementById('sidebar').classList.add('collapsed')}

function escHtml(s){const el=document.createElement('span');el.textContent=s;return el.innerHTML}
function formatDate(ts){if(!ts)return'';const d=new Date(ts),now=new Date();if(d.toDateString()===now.toDateString())return'今天';const y=new Date(now);y.setDate(now.getDate()-1);if(d.toDateString()===y.toDateString())return'昨天';return`${d.getMonth()+1}月${d.getDate()}日`}
function toast(msg,type='success'){const c=document.getElementById('toastContainer'),el=document.createElement('div');el.className=`toast ${type}`;el.textContent=msg;c.appendChild(el);requestAnimationFrame(()=>el.classList.add('show'));setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),300)},2500)}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(document.getElementById('importModal').classList.contains('active'))hideImport();
    else if(document.getElementById('catModal').classList.contains('active'))hideCatModal();
    else if(document.getElementById('settingsModal').classList.contains('active'))hideSettings();
    else if(document.getElementById('changeCatModal').classList.contains('active'))hideChangeCat();
    else if(document.getElementById('confirmModal').classList.contains('active'))hideConfirm(false);
  }
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();document.getElementById('searchInput').focus()}
});

function showSettings(){document.getElementById('settingsModal').classList.add('active');document.getElementById('settingsToken').value=getGHToken();document.getElementById('settingsStatus').innerHTML=''}
function hideSettings(){document.getElementById('settingsModal').classList.remove('active')}
async function testToken(){const token=cleanToken(document.getElementById('settingsToken').value);if(!token)return;const el=document.getElementById('settingsStatus');el.innerHTML='<span style="color:var(--text2)">连接中...</span>';try{const r=await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}`,{headers:{'Authorization':`token ${token}`,'Accept':'application/vnd.github.v3+json'}});if(r.ok)el.innerHTML='<span style="color:var(--green)">✓ 连接成功</span>';else{const e=await r.json().catch(()=>({}));el.innerHTML=`<span style="color:var(--red)">✗ ${escHtml(e.message||'Token 无效')}</span>`}}catch(e){el.innerHTML=`<span style="color:var(--red)">✗ ${escHtml(e.message||'网络错误')}</span>`}}
function saveSettings(){const token=cleanToken(document.getElementById('settingsToken').value);if(!token)return toast('请输入 Token','error');setGH(token);hideSettings();toast('设置已保存');init()}

async function init(){restoreSidebar();renderCategories();renderBooks();if(!getGHToken()){showSettings();return}try{await loadMetadata();renderCategories();renderBooks()}catch(e){if(e.message.includes('401')||e.message.includes('403')){showSettings();toast('Token 无效，请重新设置','error')}else toast('加载失败: '+e.message,'error')}}
init();
</script>
</body>
</html>
