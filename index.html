<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Reader</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f7;--card:#fff;--text:#1d1d1f;--text2:#86868b;--text3:#aeaeb2;
  --blue:#007aff;--purple:#af52de;--green:#34c759;--red:#ff3b30;--orange:#ff9500;
  --border:rgba(0,0,0,.08);--shadow:0 1px 3px rgba(0,0,0,.06),0 2px 8px rgba(0,0,0,.04);
  --shadow-lg:0 4px 20px rgba(0,0,0,.08);--radius:14px;--radius-sm:10px;
  --sidebar-w:260px;--topbar-h:56px;
  --glass:rgba(255,255,255,.72);--glass-border:rgba(255,255,255,.5);
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;font-size:14px}
input,select,textarea{font-family:inherit;font-size:14px}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.25)}

/* === LAYOUT === */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar-w);background:var(--glass);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:margin-left .3s ease;margin-left:0}
.sidebar.collapsed{margin-left:calc(var(--sidebar-w) * -1)}
.sidebar-toggle{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .15s;flex-shrink:0}
.sidebar-toggle:hover{background:rgba(0,0,0,.04);color:var(--text)}
.sidebar-toggle svg{width:18px;height:18px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* === SIDEBAR === */
.sidebar-header{padding:20px 20px 12px;display:flex;align-items:center;gap:10px}
.sidebar-title{font-size:17px;font-weight:600;letter-spacing:-.2px}
.sidebar-section{padding:8px 12px}
.sidebar-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;padding:8px 8px 4px;display:flex;align-items:center;justify-content:space-between}
.sidebar-label button{color:var(--blue);font-size:11px;font-weight:600;padding:2px 6px;border-radius:4px}
.sidebar-label button:hover{background:rgba(0,122,255,.1)}
.cat-list{list-style:none}
.cat-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:all .15s ease;position:relative;font-size:14px;color:var(--text)}
.cat-item:hover{background:rgba(0,0,0,.04)}
.cat-item.active{background:rgba(0,122,255,.1);color:var(--blue);font-weight:500}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cat-count{margin-left:auto;font-size:12px;color:var(--text3);font-weight:500}
.cat-delete{opacity:0;position:absolute;right:8px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;color:var(--text3);transition:all .15s}
.cat-item:hover .cat-delete{opacity:1}
.cat-item:hover .cat-count{opacity:0}
.cat-delete:hover{color:var(--red);background:rgba(255,59,48,.1)}
.cat-delete svg{width:12px;height:12px}
.sidebar-footer{margin-top:auto;padding:16px 20px;border-top:1px solid var(--border);font-size:12px;color:var(--text3);text-align:center}

/* === TOPBAR === */
.topbar{height:var(--topbar-h);padding:0 24px;display:flex;align-items:center;gap:16px;flex-shrink:0;border-bottom:1px solid var(--border);background:var(--glass);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px)}
.search-box{flex:1;max-width:400px;position:relative}
.search-box input{width:100%;height:36px;padding:0 12px 0 36px;border:1px solid var(--border);border-radius:var(--radius-sm);background:rgba(0,0,0,.03);outline:none;transition:all .2s}
.search-box input:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(0,122,255,.12)}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text3);pointer-events:none}
.topbar-actions{display:flex;gap:8px;margin-left:auto}
.btn{height:36px;padding:0 16px;border-radius:var(--radius-sm);font-weight:500;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:#0066d6}
.btn-ghost{color:var(--text)}
.btn-ghost:hover{background:rgba(0,0,0,.04)}
.btn svg{width:16px;height:16px}
.view-toggle{display:flex;background:rgba(0,0,0,.04);border-radius:8px;padding:2px}
.view-toggle button{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .15s}
.view-toggle button.active{background:#fff;color:var(--text);box-shadow:var(--shadow)}
.view-toggle svg{width:16px;height:16px}

/* === CONTENT === */
.content{flex:1;overflow-y:auto;padding:24px}
.content-header{margin-bottom:20px}
.content-title{font-size:22px;font-weight:600;letter-spacing:-.3px}
.content-sub{font-size:13px;color:var(--text2);margin-top:2px}

/* === GRID VIEW === */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.book-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;transition:all .2s ease;position:relative;cursor:pointer}
.book-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:rgba(0,0,0,.1)}
.book-card.pinned{border-color:var(--blue);box-shadow:0 0 0 1px var(--blue)}
.book-preview{height:140px;background:#fafafa;overflow:hidden;position:relative;border-bottom:1px solid var(--border)}
.book-pin-badge{position:absolute;top:8px;left:8px;width:24px;height:24px;background:var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center}
.book-pin-badge svg{width:12px;height:12px;fill:#fff}
.book-info{padding:14px}
.book-title{font-size:14px;font-weight:600;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;letter-spacing:-.1px}
.book-meta{display:flex;align-items:center;gap:8px;margin-top:8px}
.book-category{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.book-date{font-size:11px;color:var(--text3);margin-left:auto}
.book-progress-bar{height:3px;background:rgba(0,0,0,.06);border-radius:2px;margin-top:10px;overflow:hidden}
.book-progress-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .3s}
.book-actions{position:absolute;top:8px;right:8px;display:flex;gap:4px;opacity:0;transition:opacity .15s}
.book-card:hover .book-actions{opacity:1}
.book-action-btn{width:28px;height:28px;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);border-radius:6px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);transition:all .15s}
.book-action-btn:hover{background:#fff;box-shadow:var(--shadow)}
.book-action-btn svg{width:14px;height:14px;color:var(--text2)}
.book-action-btn.pin-active{color:var(--blue)}
.book-action-btn.pin-active svg{fill:var(--blue)}

/* === LIST VIEW === */
.list .book-card{display:flex;border-radius:var(--radius-sm);cursor:pointer}
.list .book-preview{width:80px;height:60px;flex-shrink:0;border-radius:var(--radius-sm) 0 0 var(--radius-sm);border-bottom:none;border-right:1px solid var(--border)}
.list .book-info{flex:1;padding:10px 14px;display:flex;align-items:center;gap:12px}
.list .book-title{-webkit-line-clamp:1;flex:1;min-width:0}
.list .book-meta{margin-top:0;flex-shrink:0}
.list .book-progress-bar{display:none}
.list .book-actions{position:static;opacity:0}
.list .book-card:hover .book-actions{opacity:1}

/* === EMPTY STATE === */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--text2)}
.empty-icon{width:64px;height:64px;background:rgba(0,0,0,.04);border-radius:16px;display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.empty-icon svg{width:28px;height:28px;color:var(--text3)}
.empty-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:4px}
.empty-desc{font-size:13px;text-align:center;max-width:300px;line-height:1.5}

/* === READER VIEW === */
.reader-view{position:fixed;inset:0;z-index:1000;background:#fff;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .25s ease}
.reader-view.active{opacity:1;pointer-events:all}
.reader-topbar{position:absolute;top:0;left:0;right:0;height:48px;background:var(--glass);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:10;opacity:0;transform:translateY(-100%);transition:all .3s ease}
.reader-topbar:hover,.reader-topbar.show{opacity:1;transform:translateY(0)}
.reader-close-float{position:absolute;top:12px;left:12px;z-index:11;width:36px;height:36px;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;opacity:.6;transition:all .2s;cursor:pointer;border:none}
.reader-close-float:hover{opacity:1;background:rgba(0,0,0,.7)}
.reader-close-float svg{width:18px;height:18px}

.reader-content{flex:1;position:relative;overflow:hidden}
.reader-content iframe{width:100%;height:100%;border:none}
.reader-progress-bar{height:3px;position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.06);z-index:10}
.reader-progress-fill{height:100%;background:var(--blue);transition:width .15s}

/* === MODAL === */
.modal-overlay{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.35);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.active{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.15);width:440px;max-width:90vw;max-height:80vh;overflow:auto;transform:scale(.95);transition:transform .2s}
.modal-overlay.active .modal{transform:scale(1)}
.modal-header{padding:20px 24px 16px;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:17px;font-weight:600}
.modal-close{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .15s}
.modal-close:hover{background:rgba(0,0,0,.06);color:var(--text)}
.modal-close svg{width:16px;height:16px}
.modal-body{padding:0 24px 24px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:6px}
.form-input{width:100%;height:40px;padding:0 12px;border:1px solid var(--border);border-radius:var(--radius-sm);outline:none;transition:all .2s}
.form-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,122,255,.12)}
.form-select{width:100%;height:40px;padding:0 12px;border:1px solid var(--border);border-radius:var(--radius-sm);outline:none;background:#fff;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%2386868b' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 12px center;transition:all .2s}
.form-select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,122,255,.12)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;padding-top:8px}
.btn-cancel{height:36px;padding:0 16px;border-radius:var(--radius-sm);font-weight:500;color:var(--text)}
.btn-cancel:hover{background:rgba(0,0,0,.04)}

/* === DROP ZONE === */
.drop-zone{position:fixed;inset:0;z-index:1500;background:rgba(0,122,255,.08);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.drop-zone.active{opacity:1;pointer-events:all}
.drop-zone-inner{border:3px dashed var(--blue);border-radius:24px;padding:60px 80px;text-align:center;background:rgba(255,255,255,.9)}
.drop-zone-icon{width:56px;height:56px;background:rgba(0,122,255,.1);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.drop-zone-icon svg{width:28px;height:28px;color:var(--blue)}
.drop-zone-title{font-size:18px;font-weight:600;margin-bottom:4px}
.drop-zone-desc{font-size:13px;color:var(--text2)}

/* === TOAST === */
.toast-container{position:fixed;top:20px;right:20px;z-index:3000;display:flex;flex-direction:column;gap:8px}
.toast{background:#1d1d1f;color:#fff;padding:12px 20px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.15);transform:translateX(120%);transition:transform .3s ease;max-width:320px}
.toast.show{transform:translateX(0)}
.toast.success{background:#1d1d1f}
.toast.error{background:var(--red)}

/* === IMPORT PROGRESS === */
.import-progress{margin-top:12px}
.import-bar{height:4px;background:rgba(0,0,0,.06);border-radius:2px;overflow:hidden}
.import-bar-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .3s;width:0}
.import-status{font-size:12px;color:var(--text2);margin-top:6px}

/* === CONTEXT MENU === */
.context-menu{position:fixed;z-index:2500;background:#fff;border-radius:var(--radius-sm);box-shadow:0 8px 30px rgba(0,0,0,.12);border:1px solid var(--border);padding:4px;min-width:180px;opacity:0;pointer-events:none;transform:scale(.95);transition:all .15s}
.context-menu.active{opacity:1;pointer-events:all;transform:scale(1)}
.ctx-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;font-size:13px;cursor:pointer;transition:background .1s}
.ctx-item:hover{background:rgba(0,0,0,.04)}
.ctx-item svg{width:16px;height:16px;color:var(--text2)}
.ctx-item.danger{color:var(--red)}
.ctx-item.danger svg{color:var(--red)}
.ctx-sep{height:1px;background:var(--border);margin:4px 0}

/* === CHANGE CAT MODAL === */
.cat-select-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;font-size:14px}
.cat-select-item:hover{background:rgba(0,0,0,.04)}
.cat-select-item.active{background:rgba(0,122,255,.08)}
.cat-select-item svg{margin-left:auto}

/* === LOADING === */
.loading{display:flex;align-items:center;justify-content:center;padding:40px}
.spinner{width:24px;height:24px;border:2.5px solid rgba(0,0,0,.08);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* === RESPONSIVE === */
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:100;margin-left:0;transform:translateX(-100%)}
  .sidebar.collapsed{transform:translateX(-100%);margin-left:0}
  .sidebar:not(.collapsed){transform:translateX(0)}
  .grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
}
</style>
</head>
<body>
<div class="app" id="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="sidebar-toggle" onclick="toggleSidebar()" title="收起侧边栏">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="11 17 6 12 11 7"/></svg>
      </button>
      <span class="sidebar-title">HTML Reader</span>
    </div>
    <div class="sidebar-section" style="flex:1;overflow-y:auto">
      <div class="sidebar-label">
        <span>分类</span>
        <button onclick="showAddCategory()" title="新建分类">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
      <ul class="cat-list" id="catList"></ul>
    </div>
    <div class="sidebar-footer">
      <button onclick="showSettings()" style="color:var(--text2);font-size:12px;display:flex;align-items:center;gap:4px;margin:0 auto" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--text2)'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        设置
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <button class="sidebar-toggle" onclick="toggleSidebar()" title="切换侧边栏">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="搜索文档..." oninput="onSearch()">
      </div>
      <div class="topbar-actions">
        <div class="view-toggle">
          <button id="gridViewBtn" class="active" onclick="setView('grid')" title="网格">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          </button>
          <button id="listViewBtn" onclick="setView('list')" title="列表">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          </button>
        </div>
        <button class="btn btn-primary" onclick="showImport()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          导入
        </button>
      </div>
    </div>
    <div class="content" id="content">
      <div class="content-header" id="contentHeader"></div>
      <div id="bookGrid" class="grid"></div>
    </div>
  </div>
</div>

<!-- Reader View -->
<div class="reader-view" id="readerView">
  <button class="reader-close-float" onclick="closeReader()" title="关闭">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
  <div class="reader-content">
    <iframe id="readerFrame" sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe>
    <div class="reader-progress-bar"><div class="reader-progress-fill" id="readerProgressFill"></div></div>
  </div>
</div>

<!-- Import Modal -->
<div class="modal-overlay" id="importModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">导入 HTML</span>

        <div style="font-weight:600;color:var(--text);margin-bottom:4px">🔗 连接 GitHub 仓库</div>
        需要一个 GitHub Personal Access Token (PAT) 来读写仓库 <code style="background:rgba(0,0,0,.06);padding:1px 5px;border-radius:3px;font-size:12px">${GH_USER}/${GH_REPO}</code>。
        <br>Token 仅存储在你的浏览器本地，不会上传到任何地方。
      </div>

        <label class="form-label">GitHub Token</label>
        <input type="password" class="form-input" id="settingsToken" placeholder="ghp_xxxxxxxxxxxx" style="font-family:monospace">
      </div>
      <div id="settingsStatus" style="font-size:12px;margin-top:-8px;margin-bottom:12px;min-height:18px"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="testToken()" style="margin-right:auto">测试连接</button>
        <button class="btn-cancel" onclick="hideSettings()">取消</button>
        <button class="btn btn-primary" onclick="saveSettings()">保存</button>
      </div>
    </div>
  </div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ===== CONFIG =====
const GH_USER = 'AHH20250507';
const GH_REPO = 'html-reader';
const GH_API = `https://api.github.com/repos/${GH_USER}/${GH_REPO}`;
const META_PATH = 'reader-metadata.json';
const BOOKS_DIR = 'books';

function setGH(token) {
  localStorage.setItem('hr_gh_token', token);
}

function getGHToken() {
  return localStorage.getItem('hr_gh_token') || '';
}

// ===== STATE =====
let state = {
  categories: [{id:'uncategorized',name:'未分类',color:'#86868b'}],
  books: [],
  currentCat: 'all',
  viewMode: 'grid',
  searchQuery: '',
  currentBook: null
};

let pendingFiles = [];
let selectedColor = '#007aff';

// ===== GITHUB API =====
function cleanToken(t) { return (t || '').replace(/\u2026/g, '...').replace(/[^\x20-\x7E]/g, '').trim(); }

function b64Encode(str) {
  const bytes = new TextEncoder().encode(str);
  let binary = '';
  bytes.forEach(b => binary += String.fromCharCode(b));
  return btoa(binary);
}

function b64Decode(b64) {
  const binary = atob(b64.replace(/\n/g, ''));
  const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
  return new TextDecoder().decode(bytes);
}

async function ghFetch(path, opts = {}) {
  const token = cleanToken(getGHToken());
  if (!token) { showSettings(); throw new Error('No token'); }
  const url = path.startsWith('http') ? path : `${GH_API}/contents/${path}`;
  const res = await fetch(url, {
    ...opts,
    headers: {
      'Authorization': `token ${token}`,
      'Accept': 'application/vnd.github.v3+json',
      ...(opts.headers || {})
    }
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `GitHub API error: ${res.status}`);
  }
  return res.json();
}

async function getFile(path) {
  try {
    const data = await ghFetch(path);
    return { content: b64Decode(data.content), sha: data.sha };
  } catch (e) {
    if (e.message.includes('404') || e.message.includes('Not Found')) return null;
    throw e;
  }
}

async function putFile(path, content, sha = null, message = 'Update') {
  const token = cleanToken(getGHToken());
  if (!token) { showSettings(); throw new Error('No token'); }
  const body = { message, content: b64Encode(content), branch: 'main' };
  if (sha) body.sha = sha;
  const url = `${GH_API}/contents/${path}`;
  const res = await fetch(url, {
    method: 'PUT',
    headers: {
      'Authorization': `token ${token}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `Put file failed: ${res.status}`);
  }
  return res.json();
}

async function deleteFile(path, sha, message = 'Delete') {
  const token = cleanToken(getGHToken());
  if (!token) { showSettings(); throw new Error('No token'); }
  const url = `${GH_API}/contents/${path}`;
  const res = await fetch(url, {
    method: 'DELETE',
    headers: {
      'Authorization': `token ${token}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ message, sha, branch: 'main' })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `Delete failed: ${res.status}`);
  }
  return res.json();
}

// ===== METADATA =====
let metaSha = null;

async function loadMetadata() {
  try {
    const file = await getFile(META_PATH);
    if (file) {
      const data = JSON.parse(file.content);
      metaSha = file.sha;
      state.categories = data.categories || state.categories;
      state.books = data.books || [];
    }
  } catch (e) {
    console.error('Load metadata failed:', e);
  }
}

async function saveMetadata() {
  const data = {
    version: 1,
    updatedAt: Date.now(),
    categories: state.categories,
    books: state.books
  };
  const res = await putFile(META_PATH, JSON.stringify(data, null, 2), metaSha, 'Update metadata');
  metaSha = res.content.sha;
}

// ===== RENDERING =====
function renderCategories() {
  const list = document.getElementById('catList');
  const allCount = state.books.length;
  let html = `
    <li class="cat-item ${state.currentCat === 'all' ? 'active' : ''}" onclick="selectCategory('all')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>全部</span>
      <span class="cat-count">${allCount}</span>
    </li>
    <li class="cat-item ${state.currentCat === 'pinned' ? 'active' : ''}" onclick="selectCategory('pinned')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 17v5"/><path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16h14v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z"/></svg>
      <span>已置顶</span>
      <span class="cat-count">${state.books.filter(b=>b.pinned).length}</span>
    </li>`;
  state.categories.forEach(cat => {
    const count = state.books.filter(b => b.category === cat.id).length;
    const canDelete = cat.id !== 'uncategorized';
    html += `
    <li class="cat-item ${state.currentCat === cat.id ? 'active' : ''}" onclick="selectCategory('${cat.id}')">
      <span class="cat-dot" style="background:${cat.color}"></span>
      <span>${escHtml(cat.name)}</span>
      <span class="cat-count">${count}</span>
      ${canDelete ? `<button class="cat-delete" onclick="event.stopPropagation();deleteCategory('${cat.id}')" title="删除分类">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>` : ''}
    </li>`;
  });
  list.innerHTML = html;
}

function getFilteredBooks() {
  let books = [...state.books];
  if (state.currentCat === 'pinned') {
    books = books.filter(b => b.pinned);
  } else if (state.currentCat !== 'all') {
    books = books.filter(b => b.category === state.currentCat);
  }
  if (state.searchQuery) {
    const q = state.searchQuery.toLowerCase();
    books = books.filter(b => b.title.toLowerCase().includes(q));
  }
  // Sort: pinned first, then by lastRead
  books.sort((a, b) => {
    if (a.pinned && !b.pinned) return -1;
    if (!a.pinned && b.pinned) return 1;
    return (b.lastRead || 0) - (a.lastRead || 0);
  });
  return books;
}

function renderBooks() {
  const grid = document.getElementById('bookGrid');
  const books = getFilteredBooks();
  const header = document.getElementById('contentHeader');

  let title = '全部文档';
  if (state.currentCat === 'pinned') title = '已置顶';
  else if (state.currentCat !== 'all') {
    const cat = state.categories.find(c => c.id === state.currentCat);
    title = cat ? cat.name : '文档';
  }
  if (state.searchQuery) title = `搜索"${state.searchQuery}"`;
  header.innerHTML = `<div class="content-title">${title}</div><div class="content-sub">${books.length} 个文档</div>`;

  if (books.length === 0) {
    grid.innerHTML = `
    <div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </div>
      <div class="empty-title">${state.searchQuery ? '没有找到匹配的文档' : '还没有文档'}</div>
      <div class="empty-desc">${state.searchQuery ? '试试其他关键词' : '点击右上角的「导入」按钮添加 HTML 文件'}</div>
    </div>`;
    return;
  }

  grid.className = state.viewMode === 'list' ? 'list' : 'grid';
  grid.innerHTML = books.map(book => {
    const cat = state.categories.find(c => c.id === book.category);
    const catColor = cat ? cat.color : '#86868b';
    const catName = cat ? cat.name : '未分类';
    const progress = getProgress(book.id);
    return `
    <div class="book-card ${book.pinned ? 'pinned' : ''}" onclick="openReader('${book.id}')" oncontextmenu="showCtx(event,'${book.id}')">
      <div class="book-preview">
        <div style="display:flex;align-items:center;justify-content:center;height:100%;background:linear-gradient(135deg,${catColor}08,${catColor}15)">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="${catColor}" stroke-width="1.2" stroke-linecap="round" opacity=".5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        </div>
        ${book.pinned ? '<div class="book-pin-badge"><svg viewBox="0 0 24 24"><path d="M12 17v5M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16h14v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z"/></svg></div>' : ''}
      </div>
      <div class="book-info">
        <div class="book-title">${escHtml(book.title)}</div>
        <div class="book-meta">
          <span class="book-category" style="background:${catColor}15;color:${catColor}">${escHtml(catName)}</span>
          <span class="book-date">${formatDate(book.importDate)}</span>
        </div>
        ${progress > 0 ? `<div class="book-progress-bar"><div class="book-progress-fill" style="width:${progress}%"></div></div>` : ''}
      </div>
      <div class="book-actions">
        <button class="book-action-btn ${book.pinned ? 'pin-active' : ''}" onclick="event.stopPropagation();togglePin('${book.id}')" title="${book.pinned ? '取消置顶' : '置顶'}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 17v5M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16h14v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z"/></svg>
        </button>
        <button class="book-action-btn" onclick="event.stopPropagation();downloadBook('${book.id}')" title="下载">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
        <button class="book-action-btn" onclick="event.stopPropagation();deleteBook('${book.id}')" title="删除">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </button>
      </div>
    </div>`;
  }).join('');
}

// ===== CATEGORIES =====
function selectCategory(id) {
  state.currentCat = id;
  renderCategories();
  renderBooks();
}

function showAddCategory() {
  document.getElementById('catModal').classList.add('active');
  document.getElementById('catName').value = '';
  renderColorPicker();
}

function hideCatModal() {
  document.getElementById('catModal').classList.remove('active');
}

const CAT_COLORS = ['#007aff','#5856d6','#af52de','#ff2d55','#ff3b30','#ff9500','#ffcc00','#34c759','#00c7be','#30b0c7','#8e8e93'];

function renderColorPicker() {
  const el = document.getElementById('colorPicker');
  el.innerHTML = CAT_COLORS.map(c =>
    `<button style="width:28px;height:28px;border-radius:50%;background:${c};border:2px solid ${c===selectedColor?'var(--text)':'transparent'};transition:all .15s" onclick="pickColor('${c}')"></button>`
  ).join('');
}

function pickColor(c) {
  selectedColor = c;
  renderColorPicker();
}

function addCategory() {
  const name = document.getElementById('catName').value.trim();
  if (!name) return toast('请输入分类名称', 'error');
  const id = 'cat_' + Date.now();
  state.categories.push({ id, name, color: selectedColor });
  saveMetadata();
  renderCategories();
  hideCatModal();
  toast('分类已创建');
}

async function deleteCategory(id) {
  const booksInCat = state.books.filter(b => b.category === id);
  if (booksInCat.length > 0) {
    const ok = await showConfirm('删除分类', `该分类下有 ${booksInCat.length} 个文档，删除后这些文档将移至「未分类」。确定删除？`);
    if (!ok) return;
    booksInCat.forEach(b => b.category = 'uncategorized');
  }
  state.categories = state.categories.filter(c => c.id !== id);
  if (state.currentCat === id) state.currentCat = 'all';
  saveMetadata();
  renderCategories();
  renderBooks();
  toast('分类已删除');
}

// ===== IMPORT =====
function showImport() {
  document.getElementById('importModal').classList.add('active');
  document.getElementById('fileInput').value = '';
  document.getElementById('fileLabel').textContent = '点击选择或拖放 HTML 文件';
  document.getElementById('importTitle').value = '';
  document.getElementById('importProgress').style.display = 'none';
  pendingFiles = [];
  renderImportCategorySelect();
}

function hideImport() {
  document.getElementById('importModal').classList.remove('active');
}

function renderImportCategorySelect() {
  const sel = document.getElementById('importCategory');
  sel.innerHTML = state.categories.map(c =>
    `<option value="${c.id}">${c.name}</option>`
  ).join('');
}

function onFileSelect(files) {
  pendingFiles = Array.from(files).filter(f => f.name.endsWith('.html') || f.name.endsWith('.htm'));
  if (pendingFiles.length === 0) return toast('请选择 HTML 文件', 'error');
  document.getElementById('fileLabel').textContent = pendingFiles.map(f => f.name).join(', ');
  if (pendingFiles.length === 1) {
    document.getElementById('importTitle').value = pendingFiles[0].name.replace(/\.html?$/i, '');
  }
}

async function doImport() {
  if (pendingFiles.length === 0) return toast('请先选择文件', 'error');
  const category = document.getElementById('importCategory').value;
  const customTitle = document.getElementById('importTitle').value.trim();
  const progressEl = document.getElementById('importProgress');
  const barFill = document.getElementById('importBarFill');
  const statusEl = document.getElementById('importStatus');

  progressEl.style.display = 'block';
  document.getElementById('importBtn').disabled = true;

  let successCount = 0;
  let lastError = '';

  for (let i = 0; i < pendingFiles.length; i++) {
    const file = pendingFiles[i];
    const pct = Math.round((i / pendingFiles.length) * 100);
    barFill.style.width = pct + '%';
    statusEl.textContent = `正在导入 ${file.name} (${i+1}/${pendingFiles.length})...`;

    try {
      const content = await readFile(file);
      const id = 'book_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
      const title = pendingFiles.length === 1 && customTitle ? customTitle : file.name.replace(/\.html?$/i, '');
      const filename = `${id}.html`;

      await putFile(`${BOOKS_DIR}/${filename}`, content, null, `Import ${title}`);

      state.books.push({
        id,
        title,
        filename,
        category,
        pinned: false,
        importDate: Date.now(),
        lastRead: 0
      });
      successCount++;
    } catch (e) {
      console.error('Import failed:', e);
      lastError = e.message || String(e);
    }
  }

  barFill.style.width = '100%';

  if (successCount > 0) {
    await saveMetadata().catch(e => console.error('Save metadata failed:', e));
    renderCategories();
    renderBooks();
  }

  document.getElementById('importBtn').disabled = false;

  if (successCount === pendingFiles.length) {
    statusEl.textContent = '导入完成！';
    setTimeout(() => { hideImport(); toast(`成功导入 ${successCount} 个文件`); }, 500);
  } else if (successCount > 0) {
    statusEl.textContent = `部分完成：${successCount}/${pendingFiles.length} 成功`;
    toast(`导入 ${successCount}/${pendingFiles.length} 个文件，最后一个错误: ${lastError}`, 'error');
  } else {
    statusEl.textContent = '导入失败';
    toast(`导入失败: ${lastError}`, 'error');
  }
}

function readFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsText(file);
  });
}

// ===== CONTENT CACHE =====
const contentCache = new Map();

async function getBookContent(bookId) {
  if (contentCache.has(bookId)) return contentCache.get(bookId);
  const book = state.books.find(b => b.id === bookId);
  if (!book) throw new Error('Book not found');
  const file = await getFile(`${BOOKS_DIR}/${book.filename}`);
  if (!file) throw new Error('File not found on GitHub');
  contentCache.set(bookId, file.content);
  return file.content;
}

// ===== READER =====
async function openReader(bookId) {
  const book = state.books.find(b => b.id === bookId);
  if (!book) return;

  state.currentBook = book;
  book.lastRead = Date.now();
  saveMetadata();

  document.getElementById('readerView').classList.add('active');
  document.body.style.overflow = 'hidden';

  const frame = document.getElementById('readerFrame');
  updateReaderProgress(getProgress(bookId));

  try {
    const content = await getBookContent(bookId);
    frame.srcdoc = content;

    frame.onload = () => {
      try {
        const progress = getProgress(bookId);
        const doc = frame.contentDocument || frame.contentWindow.document;
        const maxScroll = doc.documentElement.scrollHeight - doc.documentElement.clientHeight;
        if (maxScroll > 0 && progress > 0) {
          doc.documentElement.scrollTop = (progress / 100) * maxScroll;
        }
        const script = doc.createElement('script');
        script.textContent = `
          (function() {
            let ticking = false;
            function onScroll() {
              if (!ticking) {
                requestAnimationFrame(function() {
                  const el = document.documentElement;
                  const max = el.scrollHeight - el.clientHeight;
                  const pct = max > 0 ? Math.round((el.scrollTop / max) * 100) : 0;
                  window.parent.postMessage({type:'reader-progress', progress: pct}, '*');
                  ticking = false;
                });
                ticking = true;
              }
            }
            window.addEventListener('scroll', onScroll, {passive: true});
          })();
        `;
        doc.head.appendChild(script);
      } catch (e) {
        console.log('Cannot inject scroll listener:', e);
      }
    };
  } catch (e) {
    frame.srcdoc = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:-apple-system,sans-serif;color:#86868b;flex-direction:column;gap:12px">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#aeaeb2" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
      <div style="font-size:16px;font-weight:600;color:#1d1d1f">加载失败</div>
      <div style="font-size:13px">${escHtml(e.message)}</div>
    </div>`;
    toast('加载文档失败: ' + e.message, 'error');
  }
}

function closeReader() {
  document.getElementById('readerView').classList.remove('active');
  document.body.style.overflow = '';
  const frame = document.getElementById('readerFrame');
  frame.srcdoc = '';
  frame.removeAttribute('srcdoc');
  state.currentBook = null;
  renderBooks();
}

function updateReaderProgress(pct) {
  document.getElementById('readerProgressFill').style.width = pct + '%';
}

// Listen for progress messages from iframe
window.addEventListener('message', (e) => {
  if (e.data && e.data.type === 'reader-progress' && state.currentBook) {
    const pct = e.data.progress;
    setProgress(state.currentBook.id, pct);
    updateReaderProgress(pct);
  }
});

// ===== PROGRESS (localStorage) =====
function getProgress(bookId) {
  try {
    const data = JSON.parse(localStorage.getItem('hr_progress') || '{}');
    return data[bookId] || 0;
  } catch { return 0; }
}

function setProgress(bookId, pct) {
  try {
    const data = JSON.parse(localStorage.getItem('hr_progress') || '{}');
    data[bookId] = pct;
    localStorage.setItem('hr_progress', JSON.stringify(data));
  } catch {}
}

// ===== BOOK ACTIONS =====
function togglePin(bookId) {
  const book = state.books.find(b => b.id === bookId);
  if (!book) return;
  book.pinned = !book.pinned;
  saveMetadata();
  renderBooks();
  renderCategories();
  toast(book.pinned ? '已置顶' : '已取消置顶');
}

async function downloadBook(bookId) {
  const book = state.books.find(b => b.id === bookId);
  if (!book) return;
  try {
    const content = await getBookContent(bookId);
    const blob = new Blob([content], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = book.title + '.html';
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  } catch (e) {
    toast('下载失败: ' + e.message, 'error');
  }
}

function downloadCurrent() {
  if (state.currentBook) downloadBook(state.currentBook.id);
}

async function deleteBook(bookId) {
  const book = state.books.find(b => b.id === bookId);
  if (!book) return;
  const ok = await showConfirm('删除文档', `确定删除「${book.title}」？此操作不可撤销。`);
  if (!ok) return;

  try {
    const file = await getFile(`${BOOKS_DIR}/${book.filename}`);
    if (file) {
      await deleteFile(`${BOOKS_DIR}/${book.filename}`, file.sha, `Delete ${book.title}`);
    }
    state.books = state.books.filter(b => b.id !== bookId);
    await saveMetadata();
    renderCategories();
    renderBooks();
    toast('已删除');
  } catch (e) {
    toast('删除失败: ' + e.message, 'error');
  }
}

// ===== CONTEXT MENU =====

    </div>
    <div class="ctx-item" onclick="togglePin('${bookId}');hideCtx()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 17v5M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16h14v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z"/></svg>

    </div>
    <div class="ctx-item" onclick="showChangeCat('${bookId}');hideCtx()">

      更改分类
    </div>
    <div class="ctx-item" onclick="downloadBook('${bookId}');hideCtx()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      下载
    </div>
    <div class="ctx-sep"></div>
    <div class="ctx-item danger" onclick="deleteBook('${bookId}');hideCtx()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      删除
    </div>`;

  const x = Math.min(e.clientX, window.innerWidth - 200);
  const y = Math.min(e.clientY, window.innerHeight - 250);
  menu.style.left = x + 'px';
  menu.style.top = y + 'px';
  menu.classList.add('active');
}

function hideCtx() {
  document.getElementById('ctxMenu').classList.remove('active');
}

let changeCatBookId = null;

function showChangeCat(bookId) {
  changeCatBookId = bookId;
  const book = state.books.find(b => b.id === bookId);
  if (!book) return;
  const modal = document.getElementById('changeCatModal');
  const list = document.getElementById('changeCatList');
  list.innerHTML = state.categories.map(cat => {
    const active = cat.id === book.category;
    return `<div class="cat-select-item ${active ? 'active' : ''}" onclick="doChangeCat('${cat.id}')">
      <span class="cat-dot" style="background:${cat.color}"></span>
      <span>${escHtml(cat.name)}</span>
      ${active ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>' : ''}
    </div>`;
  }).join('');
  modal.classList.add('active');
}

function hideChangeCat() {
  document.getElementById('changeCatModal').classList.remove('active');
  changeCatBookId = null;
}

async function doChangeCat(catId) {
  if (!changeCatBookId) return;
  const book = state.books.find(b => b.id === changeCatBookId);
  if (!book) return;
  book.category = catId;
  await saveMetadata().catch(e => console.error(e));
  renderBooks();
  renderCategories();
  hideChangeCat();
  toast('分类已更新');
}

document.addEventListener('click', hideCtx);

// ===== VIEW =====
function setView(mode) {
  state.viewMode = mode;
  document.getElementById('gridViewBtn').classList.toggle('active', mode === 'grid');
  document.getElementById('listViewBtn').classList.toggle('active', mode === 'list');
  renderBooks();
}

// ===== SEARCH =====
function onSearch() {
  state.searchQuery = document.getElementById('searchInput').value.trim();
  renderBooks();
}

// ===== DROP ZONE =====
let dragCounter = 0;
document.addEventListener('dragenter', (e) => {
  e.preventDefault();
  dragCounter++;
  document.getElementById('dropZone').classList.add('active');
});
document.addEventListener('dragleave', (e) => {
  e.preventDefault();
  dragCounter--;
  if (dragCounter <= 0) {
    dragCounter = 0;
    document.getElementById('dropZone').classList.remove('active');
  }
});
document.addEventListener('dragover', (e) => e.preventDefault());
document.addEventListener('drop', (e) => {
  e.preventDefault();
  dragCounter = 0;
  document.getElementById('dropZone').classList.remove('active');
  const files = Array.from(e.dataTransfer.files).filter(f => f.name.endsWith('.html') || f.name.endsWith('.htm'));
  if (files.length > 0) {
    pendingFiles = files;
    showImport();
    document.getElementById('fileLabel').textContent = files.map(f => f.name).join(', ');
    if (files.length === 1) {
      document.getElementById('importTitle').value = files[0].name.replace(/\.html?$/i, '');
    }
  }
});

// File drop area highlight
const fileDropArea = document.getElementById('fileDropArea');
fileDropArea.addEventListener('dragover', (e) => {
  e.preventDefault();
  fileDropArea.style.borderColor = 'var(--blue)';
  fileDropArea.style.background = 'rgba(0,122,255,.04)';
});
fileDropArea.addEventListener('dragleave', () => {
  fileDropArea.style.borderColor = 'var(--border)';
  fileDropArea.style.background = '';
});
fileDropArea.addEventListener('drop', (e) => {
  e.preventDefault();
  fileDropArea.style.borderColor = 'var(--border)';
  fileDropArea.style.background = '';
  onFileSelect(e.dataTransfer.files);
});

// ===== MOBILE SIDEBAR =====
// ===== CONFIRM MODAL =====
let confirmResolve = null;

function showConfirm(title, msg, okText = '确定') {
  return new Promise(resolve => {
    confirmResolve = resolve;
    document.getElementById('confirmTitle').textContent = title;
    document.getElementById('confirmMsg').textContent = msg;
    const btn = document.getElementById('confirmOkBtn');
    btn.textContent = okText;
    document.getElementById('confirmModal').classList.add('active');
  });
}

function hideConfirm(result) {
  document.getElementById('confirmModal').classList.remove('active');
  if (confirmResolve) { confirmResolve(result); confirmResolve = null; }
}

// ===== SIDEBAR =====
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  sb.classList.toggle('collapsed');
  localStorage.setItem('hr_sidebar', sb.classList.contains('collapsed') ? 'collapsed' : 'open');
}

function restoreSidebar() {
  const saved = localStorage.getItem('hr_sidebar');
  if (saved === 'collapsed') {
    document.getElementById('sidebar').classList.add('collapsed');
  }
}

// ===== UTILS =====
function escHtml(s) {
  const el = document.createElement('span');
  el.textContent = s;
  return el.innerHTML;
}

function formatDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  if (d.toDateString() === now.toDateString()) return '今天';
  const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
  if (d.toDateString() === yesterday.toDateString()) return '昨天';
  return `${d.getMonth()+1}月${d.getDate()}日`;
}

function toast(msg, type = 'success') {
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  container.appendChild(el);
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 300);
  }, 2500);
}

// ===== KEYBOARD SHORTCUTS =====
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('readerView').classList.contains('active')) {
      closeReader();
    } else if (document.getElementById('importModal').classList.contains('active')) {
      hideImport();
    } else if (document.getElementById('catModal').classList.contains('active')) {
      hideCatModal();
    } else if (document.getElementById('settingsModal').classList.contains('active')) {
      hideSettings();
    } else if (document.getElementById('changeCatModal').classList.contains('active')) {
      hideChangeCat();
    } else if (document.getElementById('confirmModal').classList.contains('active')) {
      hideConfirm(false);
    }
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});

function showSettings() {
  document.getElementById('settingsModal').classList.add('active');
  document.getElementById('settingsToken').value = getGHToken();
  document.getElementById('settingsStatus').innerHTML = '';
}

function hideSettings() {
  document.getElementById('settingsModal').classList.remove('active');
}

async function testToken() {
  const token = cleanToken(document.getElementById('settingsToken').value);
  if (!token) return;
  const statusEl = document.getElementById('settingsStatus');
  statusEl.innerHTML = '<span style="color:var(--text2)">连接中...</span>';
  try {
    const res = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}`, {
      headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (res.ok) {
      statusEl.innerHTML = '<span style="color:var(--green)">✓ 连接成功</span>';
    } else {
      const err = await res.json().catch(() => ({}));
      statusEl.innerHTML = `<span style="color:var(--red)">✗ ${escHtml(err.message || 'Token 无效或权限不足')}</span>`;
    }
  } catch (e) {
    statusEl.innerHTML = `<span style="color:var(--red)">✗ ${escHtml(e.message || '网络错误')}</span>`;
  }
}

function saveSettings() {
  const token = cleanToken(document.getElementById('settingsToken').value);
  if (!token) return toast('请输入 Token', 'error');
  setGH(token);
  hideSettings();
  toast('设置已保存');
  init();
}

// ===== INIT =====
async function init() {
  restoreSidebar();
  renderCategories();
  renderBooks();
  if (!getGHToken()) {
    showSettings();
    return;
  }
  try {
    await loadMetadata();
    renderCategories();
    renderBooks();
  } catch (e) {
    console.error('Init failed:', e);
    if (e.message.includes('401') || e.message.includes('403')) {
      showSettings();
      toast('Token 无效，请重新设置', 'error');
    } else {
      toast('加载数据失败: ' + e.message, 'error');
    }
  }
}

init();
